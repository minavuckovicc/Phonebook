<div *ngIf="user">
    <h2>Korisničke informacije</h2>
    <label class="label">Ime:</label>
    <label>{{user.firstName}}</label><br><br>
    <label class="label">Prezime:</label>
    <label>{{user.lastName}}</label><br><br>
    <label class="label">Email:</label>
    <label>{{user.email}}</label><br><br>
    <label class="label">Datum rodjenja:</label>
    <label *ngIf="user.additionalInfos">{{getDateString()}}</label><br><br>
    <label class="label">Opis:</label><br><br>
    <div *ngIf="user.additionalInfos.description">
        
        <textarea disabled="true" class="description">{{user.additionalInfos.description}}</textarea><br><br>
    </div>
    <label class="label">Brojevi telefona:</label>
    <div *ngIf="user.phones" >
        <ul class="phoneList" *ngFor="let phone of user.phones">
            <li>
                {{phone.number}}
                <button *ngIf="isAdmin" class="btnDangerSmall" type="button" (click)="removePhoneFromSelected(phone.id)">Obriši broj</button>
            </li>
        </ul>
    </div>

    <div *ngIf="isAdmin" class="adminActions">
        <br>
        <label class="label">Dodaj broj telefona</label><br>
        <div class="addPhoneRow">
            <input class="inputInline" [(ngModel)]="phoneNumberDraft" name="phoneNumberDraft" placeholder="+381..." />
            <button class="btnPrimary" type="button" (click)="addPhoneToSelected()">Dodaj broj</button>
        </div>
        <div class="adminBtns">
            <button *ngIf="!isEditing" class="btnSecondary" type="button" (click)="startEdit()">Izmeni kontakt</button>
            <button class="btnDanger" type="button" [disabled]="loggedUser?.id === user.id" (click)="deleteSelectedUser()">Obriši kontakt</button>
        </div>
    </div>
</div>
<div *ngIf="!user">
    <h2>Korisničke informacije</h2><br>
    <label>Kliknite na korisnika da biste prikazali njegove informacije.</label>
</div>

<form *ngIf="isAdmin" #adminForm="ngForm" class="adminForm">
    <div *ngIf="isEditing && user" class="form editForm">
        <h3 class="editTitle">Izmena kontakta</h3>

        <div class="form-row">
            <label>Ime:</label>
            <input class="input" name="firstName" ngModel [placeholder]="user.firstName" />
        </div>

        <div class="form-row">
            <label>Prezime:</label>
            <input class="input" name="lastName" ngModel [placeholder]="user.lastName" />
        </div>

        <div class="form-row birthDateLabel">
            <label>Datum rodjenja:</label>
        </div>
        <mat-form-field class="dateField">
            <mat-label *ngIf="user.additionalInfos?.birthDate">{{setSelectedInputDateValue()}}</mat-label>
            <mat-label *ngIf="!user.additionalInfos?.birthDate"></mat-label>
            <input ngModel name="birthDate" matInput [matDatepicker]="editPicker">
            <mat-datepicker-toggle matIconSuffix [for]="editPicker"></mat-datepicker-toggle>
            <mat-datepicker #editPicker></mat-datepicker>
        </mat-form-field>

        <div class="form-row">
            <label>Opis:</label>
        </div>
        <textarea class="descriptionInput" name="description" ngModel [placeholder]="user.additionalInfos.description"></textarea>

        <div class="submitBtns">
            <button type="button" class="btnSecondary" (click)="cancelEdit()">Otkaži</button>
            <button type="button" class="btnPrimary" (click)="saveEdit()">Sačuvaj</button>
        </div>
    </div>

    <div *ngIf="showCreateForm" class="form createForm">
        <h3 class="createTitle">Dodaj novi kontakt</h3>

        <div class="form-row">
            <label>Ime:</label>
            <input class="input" name="newFirstName" ngModel placeholder="Ime" />
        </div>

        <div class="form-row">
            <label>Prezime:</label>
            <input class="input" name="newLastName" ngModel placeholder="Prezime" />
        </div>

        <div class="form-row">
            <label>Email:</label>
            <input class="input" name="newEmail" ngModel placeholder="email@primer.com" />
        </div>

        <div class="form-row birthDateLabel">
            <label>Datum rodjenja:</label>
        </div>
        <mat-form-field class="dateField">
            <input ngModel name="newBirthDate" matInput [matDatepicker]="newPicker">
            <mat-datepicker-toggle matIconSuffix [for]="newPicker"></mat-datepicker-toggle>
            <mat-datepicker #newPicker></mat-datepicker>
        </mat-form-field>

        <div class="form-row">
            <label>Opis:</label>
        </div>
        <textarea class="descriptionInput" name="newDescription" ngModel placeholder="Kratak opis kontakta..."></textarea>

        <div class="form-row">
            <label>Broj telefona:</label>
            <input class="input" name="newPhoneNumber" ngModel placeholder="+381..." />
        </div>

        <div class="form-row">
            <label>Lozinka:</label>
            <input class="input" name="newPassword" type="password" ngModel placeholder="Lozinka" />
        </div>

        <div class="submitBtns">
            <button type="button" class="btnSecondary" (click)="closeCreateUser()">Otkaži</button>
            <button type="button" class="btnPrimary" (click)="addNewUser()">Dodaj</button>
        </div>
    </div>
</form>
