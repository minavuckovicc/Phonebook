<div class="directory-item-div" *ngIf="user" (click)="clicked()">
    <img src="../../../assets/user.png" class="directory-item-picture" />
    <div class="directory-item-info">
        <p class="directory-item-name">{{user.firstName}} {{user.lastName}}</p>
        <p class="directory-item-email">{{user.email}}</p>
    </div>
</div>
